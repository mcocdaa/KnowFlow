# ============================================
# KnowFlow 全栈模式（后端 + 前端）
# 使用: docker-compose -f docker-compose.full.yml -p knowflow up
# ============================================

services:
  backend:
    ports:
      - "${BACKEND_PORT:-3000}:3000"

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: knowflow-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-8000}:8000"
    environment:
      - VITE_API_BASE_URL=http://knowflow-backend:3000
    depends_on:
      - backend

networks:
  knowflow-network:
    name: knowflow-network
