# ============================================
# KnowFlow 仅前端模式
# 使用: docker-compose -f docker-compose.frontend.yml -p knowflow up
# 注意：需要已有后端服务运行
# ============================================

services:
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: knowflow-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-8000}:8000"
    environment:
      - VITE_API_BASE_URL=http://knowflow-backend:3000
    networks:
      - knowflow-network
    depends_on:
      - backend

networks:
  knowflow-network:
    name: knowflow-network
