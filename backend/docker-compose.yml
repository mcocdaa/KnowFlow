# backend/docker-compose.yml
version: '3.8'

services:
  # 服务 1: MongoDB 数据库
  mongodb:
    image: mongo:7
    container_name: knowflow-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      # 数据持久化：MongoDB 数据存在这里，删除容器不丢数据
      - mongo_data:/data/db
    networks:
      - knowflow-network

  # 服务 2: KnowFlow 后端 (Python FastAPI)
  backend:
    build: .
    container_name: knowflow-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      # 挂载本地代码目录（开发时用：修改代码自动生效，不用重新 build）
      - ./:/app
      # 挂载数据目录：uploads、key_registry.yaml、categories.yaml
      - ./data:/app/data
      - ./uploads:/app/uploads
      # 挂载插件目录
      - ../plugins:/app/plugins
    environment:
      # 🔴 关键：MongoDB 连接地址，这里用服务名 mongodb 代替 localhost
      - MONGODB_URL=mongodb://mongodb:27017
      - MONGODB_DB_NAME=knowflow
    depends_on:
      - mongodb
    networks:
      - knowflow-network

# 数据卷
volumes:
  mongo_data:

# 网络
networks:
  knowflow-network:
    driver: bridge
